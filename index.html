<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="おやすみチェック">
<link rel="apple-touch-icon" href="icon.png">
<title>おやすみチェック</title>
<style>
:root{
  --pink:#FF9EC4; --pink-soft:#FFD6E8; --pink-pale:#FFF0F6;
  --mint:#7ED8B4; --mint-soft:#C9F2E1; 
  --sky:#8FC9F0; --sky-soft:#D6EBFA;
  --lav:#B9A3E3; --lav-soft:#E8DEF8;
  --cream:#FFF9F2; --sun:#FFD98E;
  --ink:#6B5560; --ink-soft:#9C8791;
  --card:#FFFFFF;
  --radius:22px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN W4","Rounded Mplus 1c",-apple-system,sans-serif;
  background:linear-gradient(170deg,#FFF3F8 0%,#F3F6FF 55%,#F0FBF5 100%);
  color:var(--ink);
  min-height:100%;
  padding-bottom:calc(140px + env(safe-area-inset-bottom));
}
.wrap{max-width:480px;margin:0 auto;padding:14px 14px 0;}
/* ---------- countdown header ---------- */
.countdown{
  background:linear-gradient(135deg,#FFC9DF,#C9E4FA);
  border-radius:var(--radius);
  padding:16px 18px 14px;
  text-align:center;
  box-shadow:0 6px 18px rgba(255,158,196,.28);
  position:relative;overflow:hidden;
}
.countdown .cd-label{font-size:13px;font-weight:700;color:#8A5A72;letter-spacing:.06em;}
.countdown .cd-num{font-size:44px;font-weight:800;color:#7A4A66;line-height:1.05;}
.countdown .cd-num small{font-size:16px;font-weight:700;margin-left:2px;}
.countdown .cd-date{font-size:12px;color:#8A5A72;margin-top:2px;font-weight:600;}
.cd-deco{position:absolute;font-size:20px;opacity:.55;}
.cd-deco.d1{left:10px;top:8px;} .cd-deco.d2{right:12px;top:14px;} .cd-deco.d3{left:22px;bottom:8px;} .cd-deco.d4{right:26px;bottom:6px;}
.pattern-chip{
  display:inline-block;margin-top:8px;background:rgba(255,255,255,.85);
  border-radius:999px;padding:4px 14px;font-size:13px;font-weight:700;color:#7A4A66;
}
/* ---------- cards ---------- */
.card{
  background:var(--card);border-radius:var(--radius);
  padding:16px;margin-top:14px;
  box-shadow:0 4px 14px rgba(160,140,180,.12);
}
.card h2{font-size:15px;font-weight:800;display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.card h2 .tag{font-size:11px;font-weight:700;color:#fff;border-radius:999px;padding:2px 10px;}
.tag.t-pink{background:var(--pink);} .tag.t-mint{background:var(--mint);} .tag.t-sky{background:var(--sky);} .tag.t-lav{background:var(--lav);} .tag.t-green{background:#AACB63;}
/* ---------- checklist ---------- */
.task{
  display:flex;align-items:center;gap:12px;
  padding:11px 10px;border-radius:16px;margin-bottom:6px;
  background:var(--pink-pale);
  transition:background .2s;
  cursor:pointer;user-select:none;-webkit-user-select:none;
}
.task.mint-bg{background:#F0FBF6;} .task.sky-bg{background:#F2F8FE;} .task.lav-bg{background:#F7F3FC;} .task.green-bg{background:#F6FAE8;}
.task .box{
  width:28px;height:28px;border-radius:10px;flex:none;
  border:2.5px solid var(--pink);background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;color:#fff;transition:all .15s;
}
.task.mint-bg .box{border-color:var(--mint);} .task.sky-bg .box{border-color:var(--sky);} .task.lav-bg .box{border-color:var(--lav);} .task.green-bg .box{border-color:#AACB63;}
.task.done .box{background:var(--pink);border-color:var(--pink);}
.task.mint-bg.done .box{background:var(--mint);border-color:var(--mint);}
.task.sky-bg.done .box{background:var(--sky);border-color:var(--sky);}
.task.lav-bg.done .box{background:var(--lav);border-color:var(--lav);}
.task.green-bg.done .box{background:#AACB63;border-color:#AACB63;}
.task .txt{font-size:15px;font-weight:700;}
.task.done .txt{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:var(--pink-soft);}
.all-done-badge{
  margin-top:6px;text-align:center;font-size:13px;font-weight:800;
  color:#C97A9C;background:var(--pink-soft);border-radius:14px;padding:8px;
}
.snack-note{margin-top:6px;text-align:center;font-size:12.5px;font-weight:700;color:var(--ink-soft);}
/* ---------- homework ---------- */
.hw-item{margin-bottom:12px;}
.hw-top{display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:700;margin-bottom:5px;}
.hw-top .hw-count{font-size:13px;color:var(--ink-soft);}
.hw-bar{height:16px;background:var(--sky-soft);border-radius:999px;overflow:hidden;}
.hw-fill{height:100%;background:linear-gradient(90deg,var(--sky),var(--mint));border-radius:999px;transition:width .3s;min-width:0;}
.hw-btns{display:flex;gap:8px;margin-top:7px;}
.hw-btn{
  flex:1;border:none;border-radius:12px;padding:9px 0;font-size:15px;font-weight:800;
  font-family:inherit;color:#fff;cursor:pointer;
}
.hw-btn.plus{background:var(--sky);} .hw-btn.minus{background:#D9CEDF;}
.hw-done-msg{text-align:center;font-size:13px;font-weight:800;color:#5FA88A;margin-top:4px;}
/* ---------- garden ---------- */
.garden-card{padding:12px;}
.garden-scene{border-radius:18px;overflow:hidden;display:block;width:100%;}
.pet-panel{display:flex;gap:10px;margin-top:12px;}
.pet-col{flex:1;border-radius:16px;padding:10px;text-align:center;}
.pet-col.a{background:#F2F8FE;}
.pet-col.b{background:var(--pink-pale);}
.pet-col .p-name{font-size:13.5px;font-weight:800;line-height:1.45;}
.pet-col .p-stage{font-size:12px;color:var(--ink-soft);font-weight:700;margin:2px 0 6px;}
.pet-col .p-next{font-size:11px;color:var(--ink-soft);margin-top:5px;}
.snack-btn{
  width:100%;border:none;border-radius:12px;padding:9px 4px;
  font-size:13.5px;font-weight:800;font-family:inherit;color:#fff;
  background:var(--pink);cursor:pointer;
}
.pet-col.a .snack-btn{background:var(--sky);}
.snack-btn:disabled{background:#E3DAE6;color:#B4A8B8;}
.garden-note{font-size:12px;color:var(--ink-soft);text-align:center;margin-top:10px;font-weight:600;line-height:1.6;}
@keyframes petYay{0%{transform:translateY(0)}25%{transform:translateY(-14px) rotate(-4deg)}50%{transform:translateY(0)}70%{transform:translateY(-8px) rotate(4deg)}100%{transform:translateY(0)}}
.yay{animation:petYay .9s ease;}
@keyframes idleBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes eggWiggle{0%,100%{transform:rotate(0deg)}30%{transform:rotate(3deg)}60%{transform:rotate(-3deg)}}
.pet-idle,.pet-egg{transform-box:fill-box;transform-origin:50% 100%;}
.pet-idle{animation:idleBob 3.2s ease-in-out infinite;}
.pet-idle.yay{animation:petYay .9s ease;}
.pet-egg.yay{animation:eggWiggle .8s ease;}
@media (prefers-reduced-motion:reduce){.pet-idle,.pet-egg{animation:none;}}
@keyframes heartUp{0%{opacity:1;transform:translateY(0) scale(.7)}100%{opacity:0;transform:translateY(-46px) scale(1.25)}}
.heart-float{position:absolute;font-size:18px;animation:heartUp 1.1s ease forwards;pointer-events:none;}
/* ---------- events ---------- */
.ev-item{
  display:flex;align-items:center;gap:10px;background:#FFFDF4;
  border:1.5px dashed var(--sun);border-radius:16px;padding:11px 12px;margin-bottom:8px;
}
.ev-item.past{opacity:.45;}
.ev-date{font-size:12px;font-weight:800;color:#C79A3E;background:#FFF2D4;border-radius:10px;padding:5px 8px;flex:none;}
.ev-body{flex:1;min-width:0;}
.ev-name{font-size:14.5px;font-weight:800;}
.ev-tasks{font-size:12px;color:var(--ink-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-del{border:none;background:#F3E9EE;color:#B08CA0;border-radius:10px;width:32px;height:32px;font-size:15px;flex:none;cursor:pointer;}
.form-row{margin-bottom:10px;}
.form-row label{display:block;font-size:12.5px;font-weight:800;color:var(--ink-soft);margin-bottom:4px;}
input[type=text],input[type=number],input[type=date],textarea{
  width:100%;border:2px solid #EFE3EA;border-radius:14px;padding:10px 12px;
  font-size:15px;font-family:inherit;color:var(--ink);background:#FFFDFE;outline:none;
}
input:focus,textarea:focus{border-color:var(--pink-soft);}
textarea{resize:vertical;min-height:76px;line-height:1.7;}
.btn-main{
  width:100%;border:none;border-radius:16px;padding:13px 0;margin-top:4px;
  font-size:15px;font-weight:800;font-family:inherit;color:#fff;
  background:linear-gradient(135deg,var(--pink),#F7A8D8);cursor:pointer;
  box-shadow:0 4px 12px rgba(255,158,196,.35);
}
.btn-sub{
  width:100%;border:none;border-radius:14px;padding:11px 0;margin-top:8px;
  font-size:13.5px;font-weight:800;font-family:inherit;color:#9C8791;
  background:#F1EAF0;cursor:pointer;
}
.empty-msg{text-align:center;font-size:13px;color:var(--ink-soft);padding:14px 0;font-weight:600;}
/* ---------- settings ---------- */
.set-note{font-size:12px;color:var(--ink-soft);line-height:1.7;margin-bottom:8px;}
.hw-set-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.hw-set-row input.hw-name{flex:1;}
.hw-set-row input.hw-total{width:76px;flex:none;}
.hw-set-row button{border:none;background:#F3E9EE;color:#B08CA0;border-radius:10px;width:36px;height:40px;font-size:15px;flex:none;cursor:pointer;}
/* ---------- nav ---------- */
.nav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:rgba(255,255,255,.94);backdrop-filter:blur(8px);
  border-top:1.5px solid #F3E4EC;
  display:flex;max-width:480px;margin:0 auto;left:50%;transform:translateX(-50%);
  border-radius:24px 24px 0 0;
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  width:100%;
}
.nav button{
  flex:1;border:none;background:none;font-family:inherit;cursor:pointer;
  font-size:10.5px;font-weight:800;color:#C0B0BB;padding:5px 0;border-radius:14px;
}
.nav button .ic{display:block;font-size:21px;margin-bottom:2px;filter:grayscale(.6);opacity:.6;}
.nav button.active{color:var(--pink);background:var(--pink-pale);}
.nav button.active .ic{filter:none;opacity:1;}
/* ---------- toast ---------- */
#toast{
  position:fixed;left:50%;bottom:110px;transform:translateX(-50%) translateY(16px);
  background:rgba(107,85,96,.92);color:#fff;font-size:13.5px;font-weight:700;
  padding:10px 20px;border-radius:999px;opacity:0;transition:all .3s;z-index:99;
  pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* ---------- setup overlay ---------- */
#setup,#naming{
  position:fixed;inset:0;z-index:80;overflow-y:auto;
  background:linear-gradient(170deg,#FFF0F7,#EDF4FF);
  padding:26px 18px 40px;
}
.setup-in{max-width:440px;margin:0 auto;text-align:center;}
.setup-in h1{font-size:19px;font-weight:800;margin-bottom:4px;}
.setup-in .sub{font-size:13px;color:var(--ink-soft);font-weight:700;margin-bottom:16px;}
.sp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sp-card{
  background:#fff;border:3px solid transparent;border-radius:20px;padding:12px 6px 10px;
  cursor:pointer;box-shadow:0 4px 12px rgba(160,140,180,.12);
}
.sp-card.sel{border-color:var(--pink);background:var(--pink-pale);}
.sp-card .sp-name{font-size:13.5px;font-weight:800;margin-top:4px;}
.hidden{display:none!important;}
.section-gap{height:4px;}
</style>
</head>
<body>

<div id="setup" class="hidden"></div>
<div id="naming" class="hidden"></div>

<div class="wrap">
  <div id="view-today"></div>
  <div id="view-garden" class="hidden"></div>
  <div id="view-events" class="hidden"></div>
  <div id="view-settings" class="hidden"></div>
</div>

<nav class="nav">
  <button id="nav-today" onclick="showTab('today')"><span class="ic">✅</span>きょう</button>
  <button id="nav-garden" onclick="showTab('garden')"><span class="ic">🐾</span>はこにわ</button>
  <button id="nav-events" onclick="showTab('events')"><span class="ic">🎪</span>イベント</button>
  <button id="nav-settings" onclick="showTab('settings')"><span class="ic">⚙️</span>せってい</button>
</nav>

<div id="toast"></div>

/* ---------- 日本の祝日 自動判定(振替休日・国民の休日も対応) ---------- */
function shunbun(y){ return Math.floor(20.8431+0.242194*(y-1980)-Math.floor((y-1980)/4)); }
function shubun(y){ return Math.floor(23.2488+0.242194*(y-1980)-Math.floor((y-1980)/4)); }
function isBaseHoliday(d){
  const y=d.getFullYear(), m=d.getMonth()+1, day=d.getDate(), dow=d.getDay();
  const fixed=[[1,1],[2,11],[2,23],[4,29],[5,3],[5,4],[5,5],[8,11],[11,3],[11,23]];
  if(fixed.some(f=>f[0]===m&&f[1]===day)) return true;
  const nthMon=(n)=>dow===1&&day>=(n-1)*7+1&&day<=n*7;
  if(m===1&&nthMon(2)) return true;   /* 成人の日 */
  if(m===7&&nthMon(3)) return true;   /* 海の日 */
  if(m===9&&nthMon(3)) return true;   /* 敬老の日 */
  if(m===10&&nthMon(2)) return true;  /* スポーツの日 */
  if(m===3&&day===shunbun(y)) return true; /* 春分の日 */
  if(m===9&&day===shubun(y)) return true;  /* 秋分の日 */
  return false;
}
function isJPHoliday(dateStr){
  const d=parseD(dateStr);
  if(isBaseHoliday(d)) return true;
  /* 振替休日: 日曜の祝日から連続する祝日の翌平日 */
  const prev=new Date(d);
  while(true){
    prev.setDate(prev.getDate()-1);
    if(!isBaseHoliday(prev)) break;
    if(prev.getDay()===0) return true;
  }
  /* 国民の休日: 祝日にはさまれた平日 */
  const p=new Date(d); p.setDate(p.getDate()-1);
  const n=new Date(d); n.setDate(n.getDate()+1);
  if(isBaseHoliday(p)&&isBaseHoliday(n)&&d.getDay()!==0) return true;
  return false;
}

let S=loadState();
function loadState(){
  try{
    const raw=localStorage.getItem(KEY);
    if(!raw) return JSON.parse(JSON.stringify(DEFAULT_STATE));
    const s=JSON.parse(raw);
    /* 欠けたキーはデフォルトで補完 */
    const s2=Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), s);
    /* 旧バージョンのペット(画像がない種類)は選び直しに */
    ['a','b'].forEach(w=>{
      let p=s2.pets[w]||{sp:null,fed:0,snacks:0,petName:null};

        s2.setup=false;
      }
      if(p.petName===undefined) p.petName=null;
      s2.pets[w]=p;
    });
    return s2;
  }catch(e){ return JSON.parse(JSON.stringify(DEFAULT_STATE)); }
}

function todayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function parseD(s){ const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function dayDiff(a,b){ return Math.round((parseD(b)-parseD(a))/86400000); }
function fmtMD(s){ const p=s.split('-'); return (+p[1])+'/'+(+p[2]); }
const WD=['にち','げつ','か','すい','もく','きん','ど'];

/* ---------- 今日のパターン判定 ---------- */
function patternFor(dateStr){
  const dow=parseD(dateStr).getDay();
  if(dow===0 || isJPHoliday(dateStr))
    return {type:'sunday', label:'🚗 しんせきの日(日曜・祝日)', tasks:S.patterns.sunday, bg:'sky-bg'};
  if(dow===6)
    return {type:'saturday', label:'🎵 ならいごとの日(土曜)', tasks:S.patterns.saturday, bg:'mint-bg'};
  return {type:'weekday', label:'☀️ いつもの日(平日)', tasks:S.patterns.weekday, bg:'green-bg'};
}

/* ---------- チェック状態 ---------- */
function checksFor(dateStr){
  if(!S.checks[dateStr]) S.checks[dateStr]={daily:{},ca:{},cb:{}};
  return S.checks[dateStr];
}

/* =========================================================
   ペット SVG イラスト
========================================================= */
const SPECIES={
  usagi:  {name:'うさぎ',     egg:'わたげのたまご'},
  dragon: {name:'ドラゴン',   egg:'くせげのたまご'},
  unicorn:{name:'ユニコーン', egg:'つののたまご'},
  lion:   {name:'ライオン',   egg:'しっぽのたまご'},
  griffon:{name:'グリフォン', egg:'くちばしのたまご'},
  hitsuji:{name:'ひつじ',     egg:'くものたまご'}
};
const STAGE_NAMES=['たまご','あかちゃん','こども','おとな','キラキラ'];
const STAGE_TH=[0,3,9,17,28]; /* fed回数のしきい値 */
function stageOf(fed){
  if(fed>=STAGE_TH[4])return 4;
  if(fed>=STAGE_TH[3])return 3;
  if(fed>=STAGE_TH[2])return 2;
  if(fed>=STAGE_TH[1])return 1;
  return 0;
}
function nextInfo(fed){
  const st=stageOf(fed);
  if(st>=4) return 'さいこうまで そだったよ!';
  return 'つぎまで あと'+(STAGE_TH[st+1]-fed)+'かい';
}

function petMeta(sp,stage){ return PET_IMG[sp][stage]; }
function petIMG(sp,stage,h){
  const m=petMeta(sp,stage);
  const w=Math.round(h*m.w/m.h);
  return `<img src="${m.s}" width="${w}" height="${h}" style="display:block;margin:0 auto;" alt="">`;
}

}

/* =========================================================
   きょう タブ
========================================================= */
function renderToday(){
  const el=document.getElementById('view-today');
  const t=todayStr();
  const pat=patternFor(t);
  const ev=S.events.find(e=>e.date===t);
  const ck=checksFor(t);
  const d=parseD(t);
  const dateLabel=fmtMD(t)+'('+WD[d.getDay()]+')';

  /* カウントダウン */
  const vn=S.vacName||'なつやすみ';
  let cdLabel, cdNum, cdUnit='にち';
  const toStart=dayDiff(t,S.start);
  const toEnd=dayDiff(t,S.end);
  if(toStart>0){ cdLabel=vn+' まで'; cdNum=toStart; }
  else if(toEnd>0){ cdLabel=vn+'は あと'; cdNum=toEnd; }
  else if(toEnd===0){ cdLabel='きょうが '+vn; cdNum='さいごの日'; cdUnit=''; }
  else { cdLabel=vn; cdNum='おつかれさま!'; cdUnit=''; }

  /* 季節の飾り(開始月で自動切替) */
  const sm=parseD(S.start).getMonth()+1;
  let deco=['✨','📚','🌈','🍀'];
  if(sm===7||sm===8) deco=['🌻','🍉','⛱️','🎐'];
  else if(sm===12||sm===1||sm===2) deco=['⛄','🎄','🍊','🧤'];
  else if(sm===3||sm===4) deco=['🌸','🌷','🦋','🍡'];

  let html=`
  <div class="countdown">
    <span class="cd-deco d1">${deco[0]}</span><span class="cd-deco d2">${deco[1]}</span>
    <span class="cd-deco d3">${deco[2]}</span><span class="cd-deco d4">${deco[3]}</span>
    <div class="cd-label">${cdLabel}</div>
    <div class="cd-num" ${typeof cdNum==='number'?'':'style="font-size:26px;padding:6px 0;"'}>${cdNum}<small>${cdUnit}</small></div>
    <div class="cd-date">きょうは ${dateLabel}</div>
    <div class="pattern-chip">${pat.label}</div>${ev?`<div class="pattern-chip" style="margin-left:6px;">🎪 ${escH(ev.name)}</div>`:''}
  </div>`;

  /* きょうのやること */
  html+=`<div class="card"><h2>📝 きょうのやること <span class="tag ${pat.type==='sunday'?'t-sky':pat.type==='saturday'?'t-mint':'t-green'}">まいにち</span></h2>`;
  const evTasks=ev?ev.tasks:[];
  if(pat.tasks.length===0 && evTasks.length===0){
    html+=`<div class="empty-msg">やることが とうろくされていません<br>(せってい / イベントで追加できます)</div>`;
  }
  pat.tasks.forEach(task=>{
    const done=!!ck.daily[task];
    html+=`<div class="task ${pat.bg} ${done?'done':''}" onclick="toggleDaily('${esc(task)}')">
      <div class="box">${done?'✓':''}</div><div class="txt">${escH(task)}</div></div>`;
  });
  if(ev){
    html+=`<div style="font-size:13px;font-weight:800;margin:10px 2px 6px;color:#8A79B8;">🎪 ${escH(ev.name)}</div>`;
    evTasks.forEach(task=>{
      const done=!!ck.daily[task];
      html+=`<div class="task lav-bg ${done?'done':''}" onclick="toggleDaily('${esc(task)}')">
        <div class="box">${done?'✓':''}</div><div class="txt">${escH(task)}</div></div>`;
    });
  }
  const allToday=pat.tasks.concat(evTasks);
  if(allToday.length>0 && allToday.every(x=>ck.daily[x])){
    html+=`<div class="all-done-badge">🎉 きょうのやること ぜんぶクリア!</div>`;
  }
  html+=`</div>`;

  /* お手伝い(2人分) */
  ['a','b'].forEach(who=>{
    const list=S.chores[who];
    const ckKey=who==='a'?'ca':'cb';
    const allDone=list.length>0 && list.every(x=>ck[ckKey][x]);
    const granted=S.granted[t]&&S.granted[t][who];
    html+=`<div class="card"><h2>${who==='a'?'💙':'💗'} ${escH(S.names[who])}のおてつだい <span class="tag ${who==='a'?'t-sky':'t-pink'}">ペットのおやつ</span></h2>`;
    list.forEach(task=>{
      const done=!!ck[ckKey][task];
      html+=`<div class="task ${who==='a'?'sky-bg':''} ${done?'done':''}" onclick="toggleChore('${who}','${esc(task)}')">
        <div class="box">${done?'✓':''}</div><div class="txt">${escH(task)}</div></div>`;
    });
    if(allDone){
      html+=`<div class="all-done-badge">🍪 ぜんぶできた! おやつゲット!<br><span style="font-size:11.5px;">「はこにわ」でペットにあげてね</span></div>`;
    }else{
      html+=`<div class="snack-note">ぜんぶ ✓ にすると おやつが もらえるよ</div>`;
    }
    html+=`</div>`;
  });

  /* 宿題(兄のみ) */
  if(S.homework.length>0){
    html+=`<div class="card"><h2>📖 ${escH(S.names.a)}のしゅくだい <span class="tag t-mint">すすみぐあい</span></h2>`;
    S.homework.forEach((hw,i)=>{
      const pct=hw.total>0?Math.min(100,Math.round(hw.done/hw.total*100)):0;
      html+=`<div class="hw-item">
        <div class="hw-top"><span>${escH(hw.name)}</span><span class="hw-count">${hw.done} / ${hw.total} (${pct}%)</span></div>
        <div class="hw-bar"><div class="hw-fill" style="width:${pct}%"></div></div>
        <div class="hw-btns">
          <button class="hw-btn minus" onclick="hwStep(${i},-1)">−1</button>
          <button class="hw-btn plus" onclick="hwStep(${i},1)">＋1 すすんだ!</button>
        </div>
        ${hw.done>=hw.total&&hw.total>0?'<div class="hw-done-msg">🌟 かんりょう! よくがんばりました!</div>':''}
      </div>`;
    });
    html+=`</div>`;
  }
  html+=`<div class="section-gap"></div>`;
  el.innerHTML=html;
}

function toggleDaily(task){
  task=unesc(task);
  const ck=checksFor(todayStr());
  ck.daily[task]=!ck.daily[task];
  save(); renderToday();
}
function toggleChore(who,task){
  task=unesc(task);
  const t=todayStr();
  const ck=checksFor(t);
  const key=who==='a'?'ca':'cb';
  ck[key][task]=!ck[key][task];
  /* 全部そろったら おやつ付与(1日1回) */
  const all=S.chores[who].length>0 && S.chores[who].every(x=>ck[key][x]);
  if(!S.granted[t]) S.granted[t]={};
  if(all && !S.granted[t][who]){
    S.granted[t][who]=true;
    S.pets[who].snacks++;
    toast('🍪 '+S.names[who]+'、おやつゲット!');
  }
  save(); renderToday();
}
function hwStep(i,d){
  const hw=S.homework[i];
  hw.done=Math.max(0,Math.min(hw.total,hw.done+d));
  save(); renderToday();
}

  const scene=`<svg class="garden-scene" viewBox="0 0 346 210" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1">

      </linearGradient>

    <circle cx="306" cy="34" r="27" fill="#FFE08F" opacity=".35"/>
    <ellipse cx="70" cy="38" rx="26" ry="11" fill="#FFF" opacity=".9"/>
    <ellipse cx="94" cy="44" rx="20" ry="9" fill="#FFF" opacity=".9"/>
    <ellipse cx="180" cy="24" rx="22" ry="9" fill="#FFF" opacity=".75"/>
    <path d="M0,158 Q86,140 173,152 T346,150 L346,210 L0,210 Z" fill="url(#grdG)"/>
    ${flowerSVG}
    <g id="pet-a-g" class="${stageOf(pa.fed)===0?'pet-egg':'pet-idle'}">${petAW}</g>
    <g id="pet-b-g" class="${stageOf(pb.fed)===0?'pet-egg':'pet-idle'}">${petBW}</g>
  </svg>`;

  function panel(who){
    const p=S.pets[who];
    if(!p.sp) return '';
    const st=stageOf(p.fed);
    const label=st===0?SPECIES[p.sp].egg:(p.petName||'なまえを つけてね');

    const nameBtn=(st>0&&!p.petName)?`<button class="btn-sub" style="margin-top:6px;padding:7px 0;" onclick="openNaming('${who}',false)">✏️ なまえをつける</button>`:'';
    return `<div class="pet-col ${who}" style="position:relative;" id="panel-${who}">

  <div class="section-gap"></div>`;

/* シーン内にペットを配置(cx=中心X、地面ライン基準で下ぞろえ) */
function petImgInScene(sp,stage,cx){
  const m=petMeta(sp,stage);
  const h=[58,66,78,90,98][stage];
  const w=h*m.w/m.h;
  const y=162-h;
  return `<image href="${m.s}" x="${(cx-w/2).toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}"/>`;
}

function feed(who){
  const p=S.pets[who];
  if(p.snacks<=0) return;
  const before=stageOf(p.fed);
  p.snacks--; p.fed++;
  save();
  const after=stageOf(p.fed);
  renderGarden();
  /* アニメーション */
  const g=document.getElementById('pet-'+who+'-g');
  if(g){ g.classList.add('yay'); setTimeout(()=>g.classList.remove('yay'),950); }
  const panel=document.getElementById('panel-'+who);
  if(panel){
    for(let i=0;i<3;i++){
      const h=document.createElement('span');
      h.className='heart-float';
      h.textContent=['💗','💛','⭐'][i];
      h.style.left=(30+i*22)+'%';
      h.style.top='-6px';
      panel.appendChild(h);
      setTimeout(()=>h.remove(),1200);
    }
  }
  if(before===0&&after>=1){
    setTimeout(()=>openNaming(who,true),750);
  }else if(after>before){
    const nm=p.petName||SPECIES[p.sp].name;
    setTimeout(()=>toast('🎉 '+nm+'が「'+STAGE_NAMES[after]+'」にせいちょう!'),500);
  }else if(after===0){
    toast('こつん… たまごが うごいた!');
  }else{
    toast('もぐもぐ… '+(p.petName||SPECIES[p.sp].name)+'は うれしそう!');
  }
}

function addEvent(){
  const date=document.getElementById('ev-date').value;
  const name=document.getElementById('ev-name').value.trim();
  const tasks=document.getElementById('ev-tasks').value.split('\n').map(x=>x.trim()).filter(x=>x);
  if(!date){ toast('日づけを えらんでください'); return; }
  if(!name){ toast('イベント名を 入れてください'); return; }
  const exist=S.events.find(e=>e.date===date);
  if(exist){
    if(!confirm(fmtMD(date)+' には「'+exist.name+'」が登録済みです。上書きしますか?')) return;
    S.events.splice(S.events.indexOf(exist),1);
  }
  S.events.push({date,name,tasks});
  save(); renderEvents();
  toast('🎪 「'+name+'」をとうろくしました');
}
function delEvent(i){
  const ev=S.events[i];
  if(!confirm('「'+ev.name+'」を削除しますか?')) return;
  S.events.splice(i,1);
  save(); renderEvents();
}

    <div class="set-note">1行に1つずつ書いてください。曜日で自動的に切り替わります。</div>
    <div class="form-row"><label>☀️ 平日</label><textarea id="set-weekday">${escH(S.patterns.weekday.join('\n'))}</textarea></div>
    <div class="form-row"><label>🎵 土曜(ならいごとの日)</label><textarea id="set-saturday">${escH(S.patterns.saturday.join('\n'))}</textarea></div>
    <div class="form-row"><label>🚗 日曜・祝日</label><textarea id="set-sunday">${escH(S.patterns.sunday.join('\n'))}</textarea></div>
  </div>
  <div class="card">
    <h2>🧺 おてつだい(ペットのおやつ)</h2>
    <div class="set-note">全部できた日に、その子のペットへのおやつが1つもらえます。</div>
    <div class="form-row"><label>💙 ${escH(S.names.a)}</label><textarea id="set-chores-a">${escH(S.chores.a.join('\n'))}</textarea></div>
    <div class="form-row"><label>💜 ${escH(S.names.b)}</label><textarea id="set-chores-b">${escH(S.chores.b.join('\n'))}</textarea></div>
  </div>
  <div class="card">
    <h2>📖 しゅくだい(${escH(S.names.a)}用)</h2>
    <div class="set-note">名前と、ぜんぶの数(ページ数・枚数など)を入れてください。</div>
    ${hwRows}
    <button class="btn-sub" onclick="addHw()">＋ しゅくだいを追加</button>
  </div>
  <button class="btn-main" onclick="saveSettings()">💾 せっていをほぞんする</button>
  <button class="btn-sub" onclick="newVacation()">🔄 あたらしい休みをはじめる(記録リセット)</button>
  ${S.pets.a.sp&&stageOf(S.pets.a.fed)>0?`<button class="btn-sub" onclick="openNaming('a',false)">✏️ ${escH(S.names.a)}のペットのなまえをかえる</button>`:''}
  ${S.pets.b.sp&&stageOf(S.pets.b.fed)>0?`<button class="btn-sub" onclick="openNaming('b',false)">✏️ ${escH(S.names.b)}のペットのなまえをかえる</button>`:''}
  <button class="btn-sub" onclick="rechoosePets()">🐾 ペットをえらびなおす(成長もリセット)</button>
  <button class="btn-sub" style="opacity:.45;font-size:12px;" onclick="testSnack()">🍪 おためしおやつ+10(おうちのひと確認用)</button>
  <div class="section-gap"></div>`;
}
function newVacation(){
  if(!confirm('あたらしい休みを始めますか?\n\nリセットされるもの:\n・毎日のチェック記録\n・イベント\n・宿題の進みぐあい(0に戻る)\n・おやつ獲得の記録\n\n残るもの:\n・タスクのリスト内容、名前などの設定')) return;
  S.checks={};
  S.granted={};
  S.events=[];
  S.homework.forEach(hw=>hw.done=0);
  ['a','b'].forEach(w=>S.pets[w].snacks=0);
  const keep=confirm('ペットの成長は引き継ぎますか?\n\nOK = そだったまま引き継ぐ\nキャンセル = たまごから育て直す(選び直し)');
  if(!keep){
    S.pets={a:{sp:null,fed:0,snacks:0,petName:null}, b:{sp:null,fed:0,snacks:0,petName:null}};
    S.setup=false;
  }
  save();
  toast('🔄 リセットしました。名前と期間を設定して保存してね');
  if(!S.setup){ startSetup(); }
  renderSettings();
}
function linesOf(id){
  return document.getElementById(id).value.split('\n').map(x=>x.trim()).filter(x=>x);
}
function saveSettings(){
  const na=document.getElementById('set-name-a').value.trim();
  const nb=document.getElementById('set-name-b').value.trim();
  if(na) S.names.a=na;
  if(nb) S.names.b=nb;
  const vn=document.getElementById('set-vacname').value.trim();
  if(vn) S.vacName=vn;
  const st=document.getElementById('set-start').value;
  const en=document.getElementById('set-end').value;
  if(st) S.start=st;
  if(en) S.end=en;
  if(parseD(S.end)<parseD(S.start)){ toast('おわりの日が はじまりより前です'); return; }
  S.patterns.weekday=linesOf('set-weekday');
  S.patterns.saturday=linesOf('set-saturday');
  S.patterns.sunday=linesOf('set-sunday');
  S.chores.a=linesOf('set-chores-a');
  S.chores.b=linesOf('set-chores-b');
  /* 宿題 */
  const newHw=[];
  S.homework.forEach((hw,i)=>{
    const nameEl=document.getElementById('hw-name-'+i);
    const totalEl=document.getElementById('hw-total-'+i);
    if(!nameEl) return;
    const name=nameEl.value.trim();
    const total=Math.max(1,parseInt(totalEl.value)||1);
    if(name) newHw.push({name,total,done:Math.min(hw.done,total)});
  });
  S.homework=newHw;
  save();
  toast('💾 ほぞんしました');
  renderSettings();
}
function addHw(){
  saveSettingsSilent();
  S.homework.push({name:'',total:10,done:0});
  renderSettings();
}
function delHw(i){
  saveSettingsSilent();
  S.homework.splice(i,1);
  save(); renderSettings();
}
function saveSettingsSilent(){
  /* 追加/削除時に入力途中の宿題欄を保持 */
  S.homework.forEach((hw,i)=>{
    const nameEl=document.getElementById('hw-name-'+i);
    const totalEl=document.getElementById('hw-total-'+i);
    if(nameEl){ hw.name=nameEl.value; hw.total=Math.max(1,parseInt(totalEl.value)||1); }
  });
}
function testSnack(){
  if(!confirm('確認用に、選ばれている全ペットへおやつを10こずつ追加します。\n(確認が終わったら「あたらしい休みをはじめる」でリセットできます)')) return;
  ['a','b'].forEach(w=>{ if(S.pets[w].sp) S.pets[w].snacks+=10; });
  save();
  toast('🍪 おためしおやつを追加しました');
}
function rechoosePets(){
  if(!confirm('ペットの種類と成長(おやつ回数)をリセットして、選び直しますか?')) return;
  S.pets={a:{sp:null,fed:0,snacks:0,petName:null}, b:{sp:null,fed:0,snacks:0,petName:null}};
  S.setup=false;
  save();
  startSetup();
}

/* =========================================================
   初回セットアップ(ペット選び)
========================================================= */
let setupStep='a', setupSel=null;
function startSetup(){
  setupStep='a'; setupSel=null;
  document.getElementById('setup').classList.remove('hidden');
  renderSetup();
}
function renderSetup(){
  const who=setupStep;
  const el=document.getElementById('setup');
  let grid='';
  Object.keys(SPECIES).forEach(key=>{
    grid+=`<div class="sp-card ${setupSel===key?'sel':''}" onclick="pickSp('${key}')">
      ${petIMG(key,0,84)}
      <div class="sp-name">${SPECIES[key].egg}</div>
    </div>`;
  });
  el.innerHTML=`<div class="setup-in">
    <h1>🥚 ${escH(S.names[who])}のたまごをえらぼう!</h1>
    <div class="sub">${who==='a'?'1人目':'2人目'}のたまごです。おやつをあげると…なにが うまれるかな?</div>
    <div class="sp-grid">${grid}</div>
    <button class="btn-main" style="margin-top:16px;" onclick="confirmSp()">${who==='a'?'つぎへ ▶':'✨ はこにわに おむかえする!'}</button>
  </div>`;
}
function pickSp(key){ setupSel=key; renderSetup(); }
function confirmSp(){
  if(!setupSel){ toast('ペットを えらんでね'); return; }
  S.pets[setupStep].sp=setupSel;
  if(setupStep==='a'){
    setupStep='b'; setupSel=null; save(); renderSetup();
  }else{
    S.setup=true; save();
    document.getElementById('setup').classList.add('hidden');
    showTab('garden');
    toast('🎉 2ひきが はこにわに やってきた!');
  }
}

/* =========================================================
   共通
========================================================= */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._tm);
  t._tm=setTimeout(()=>t.classList.remove('show'),2200);
}
function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escA(s){ return escH(s).replace(/"/g,'&quot;'); }
function esc(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function unesc(s){ return s; }

function render(tab){
  if(tab==='today') renderToday();
  if(tab==='garden') renderGarden();
  if(tab==='events') renderEvents();
  if(tab==='settings') renderSettings();
}

/* 日付が変わったら自動で今日の表示に更新 */
let lastDate=todayStr();
setInterval(()=>{
  const now=todayStr();
  if(now!==lastDate){ lastDate=now; renderToday(); }
},30000);

/* ときどき ぴょんと はねる(たまごは ゆれる) */
setInterval(()=>{
  if(document.getElementById('view-garden').classList.contains('hidden')) return;
  ['a','b'].forEach(w=>{
    if(S.pets[w].sp&&Math.random()<0.22){
      const g=document.getElementById('pet-'+w+'-g');
      if(g&&!g.classList.contains('yay')){
        g.classList.add('yay');
        setTimeout(()=>g.classList.remove('yay'),1000);
      }
    }
  });
},2800);

/* 起動 */
if(!S.setup){ startSetup(); }
showTab('today');
</script>
</body>
</html>
